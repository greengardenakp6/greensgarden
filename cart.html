<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GreenGardenCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f3f6;
            color: #212121;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #e0e0e0;
        }
        ::-webkit-scrollbar-thumb {
            background: #2874f0;
            border-radius: 10px;
        }

        .navbar {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #2874f0;
            transform: translateX(-4px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ========== CUSTOM LOGO STYLES ========== */
        /* Replace the logo by changing the image URL below */
        .custom-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .custom-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fallback icon if image fails to load */
        .custom-logo .logo-fallback {
            font-size: 24px;
            color: white;
            display: none;
        }

        .custom-logo img.error + .logo-fallback {
            display: flex;
        }

        .brand-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .container {
            max-width: 1280px;
            margin: 32px auto;
            padding: 0 32px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 28px;
        }

        .cart-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .cart-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .cart-items {
            padding: 0 24px;
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #f0f2f5;
            transition: all 0.2s;
        }

        .cart-item:hover {
            background: #fafbfc;
            margin: 0 -8px;
            padding: 20px 8px;
            border-radius: 16px;
        }

        .item-img {
            width: 100px;
            height: 100px;
            background: #f8f9fa;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-img i {
            font-size: 40px;
            color: #2e7d32;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .item-price {
            font-weight: 700;
            font-size: 18px;
            color: #2874f0;
            margin-bottom: 12px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f3f6;
            padding: 6px 12px;
            border-radius: 40px;
            width: fit-content;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: #2874f0;
            transition: all 0.2s;
        }

        .qty-btn:hover:not(:disabled) {
            background: #2874f0;
            color: white;
        }

        .qty-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .qty-value {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            transform: scale(1.1);
        }

        .summary-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            position: sticky;
            top: 100px;
            height: fit-content;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .summary-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f2f5;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            color: #5f6c76;
        }

        .total-row {
            border-top: 1px solid #f0f2f5;
            margin-top: 12px;
            padding-top: 16px;
            font-weight: 800;
            font-size: 20px;
            color: #212121;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #fb641b, #f5721f);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(251,100,27,0.3);
        }

        .clear-cart-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 40px;
            margin-top: 12px;
            font-weight: 600;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clear-cart-btn:hover {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .empty-cart {
            text-align: center;
            padding: 80px 40px;
        }

        .empty-cart i {
            font-size: 80px;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .empty-cart h3 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .shop-now-btn {
            background: linear-gradient(135deg, #2874f0, #1a5bbf);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(33,33,33,0.95);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            z-index: 2000;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 0 20px;
            }
            .cart-item {
                flex-wrap: wrap;
            }
            .navbar {
                padding: 12px 20px;
            }
            .custom-logo {
                width: 36px;
                height: 36px;
            }
            .brand-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <button class="back-btn" onclick="window.location.href='products.html'">
        <i class="fas fa-arrow-left"></i> Continue Shopping
    </button>
    <div class="brand">
        <!-- ========== YOUR CUSTOM LOGO GOES HERE ========== -->
        <!-- 
            TO ADD YOUR OWN LOGO:
            1. Replace the image URL below with your logo image path
            2. Supported formats: PNG, JPG, JPEG, SVG, WebP
            3. If the image fails to load, a garden leaf icon will show as fallback
        -->
        <div class="custom-logo" id="customLogoContainer">
            <img id="brandLogo" src="https://placehold.co/200x200/2e7d32/ffffff?text=GG" alt="My Garden Store Logo" onerror="handleLogoError(this)">
            <i class="fas fa-leaf logo-fallback"></i>
        </div>
        <div class="brand-text">GREEN GARDEN</div>
    </div>
    <div style="width: 100px;"></div>
</nav>

<div class="container">
    <div class="cart-card">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> My Cart</h2>
            <span id="itemCount" style="color: #64748b;">0 items</span>
        </div>
        <div id="cartItemsContainer" class="cart-items"></div>
    </div>

    <div class="summary-card">
        <div class="summary-title">Price Details</div>
        <div class="price-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
        </div>
        <div class="price-row">
            <span>Shipping</span>
            <span>FREE</span>
        </div>
        <div class="price-row">
            <span>Platform Fee</span>
            <span>₹10</span>
        </div>
        <div class="price-row total-row">
            <span>Total</span>
            <span id="totalAmount">₹0</span>
        </div>
        <button class="checkout-btn" onclick="proceedToCheckout()">
            <i class="fas fa-lock"></i> PROCEED TO CHECKOUT
        </button>
        <button class="clear-cart-btn" onclick="clearCart()">
            <i class="fas fa-trash-alt"></i> Clear Cart
        </button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>

    const YOUR_LOGO_URL = "logo1.jpg";
    // 👆 Replace the URL above with your own logo image path
    // ===============================================
    
    function handleLogoError(imgElement) {
        // If logo fails to load, show fallback icon
        imgElement.style.display = 'none';
        const fallbackIcon = imgElement.parentElement.querySelector('.logo-fallback');
        if (fallbackIcon) {
            fallbackIcon.style.display = 'flex';
        }
    }
    
    function setCustomLogo() {
        const logoImg = document.getElementById('brandLogo');
        if (logoImg && YOUR_LOGO_URL) {
            logoImg.src = YOUR_LOGO_URL;
            // Reset display if it was hidden from previous error
            logoImg.style.display = 'block';
            const fallbackIcon = logoImg.parentElement.querySelector('.logo-fallback');
            if (fallbackIcon) {
                fallbackIcon.style.display = 'none';
            }
        }
    }
    
    // Call this function when page loads to apply your logo
    // You can also call this anytime to dynamically change the logo
    
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = isError ? 'rgba(239,68,68,0.95)' : 'rgba(33,33,33,0.95)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getCart() {
        const cart = localStorage.getItem('cart');
        return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function getIconForProduct(name) {
        const nameLower = name.toLowerCase();
        if (nameLower.includes('rose')) return 'fa-rose';
        if (nameLower.includes('seed')) return 'fa-leaf';
        if (nameLower.includes('pot')) return 'fa-flask';
        if (nameLower.includes('plant')) return 'fa-tree';
        if (nameLower.includes('mix')) return 'fa-droplet';
        return 'fa-seedling';
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cartItemsContainer');
        const itemCountSpan = document.getElementById('itemCount');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-seedling"></i>
                    <h3>Your cart is empty</h3>
                    <p>Add some beautiful plants and seeds to get started!</p>
                    <button class="shop-now-btn" onclick="window.location.href='products.html'">
                        <i class="fas fa-store"></i> Shop Now
                    </button>
                </div>
            `;
            itemCountSpan.textContent = '0 items';
            document.getElementById('subtotal').textContent = '₹0';
            document.getElementById('totalAmount').textContent = '₹10';
            return;
        }
        
        let subtotal = 0;
        let itemsHtml = '';
        
        cart.forEach((item, index) => {
            const price = typeof item.price === 'number' ? item.price : parseFloat(item.price) || 0;
            const quantity = item.quantity || 1;
            const total = price * quantity;
            subtotal += total;
            const icon = getIconForProduct(item.name);
            
            itemsHtml += `
                <div class="cart-item" data-index="${index}">
                    <div class="item-img">
                        ${item.image ? 
                            `<img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<i class=\'fas ${icon}\'></i>'">` : 
                            `<i class="fas ${icon}"></i>`
                        }
                    </div>
                    <div class="item-details">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="item-price">₹${price.toLocaleString('en-IN')}</div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                            <span class="qty-value">${quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${index})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
        });
        
        container.innerHTML = itemsHtml;
        
        const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        itemCountSpan.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
        
        const platformFee = 10;
        const total = subtotal + platformFee;
        
        document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString('en-IN')}`;
        document.getElementById('totalAmount').textContent = `₹${total.toLocaleString('en-IN')}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function updateQuantity(index, change) {
        const cart = getCart();
        if (cart[index]) {
            const newQuantity = (cart[index].quantity || 1) + change;
            if (newQuantity >= 1 && newQuantity <= 99) {
                cart[index].quantity = newQuantity;
                saveCart(cart);
                renderCart();
                showToast(change > 0 ? 'Quantity increased' : 'Quantity decreased');
            } else if (newQuantity < 1) {
                showToast('Minimum quantity is 1', true);
            } else if (newQuantity > 99) {
                showToast('Maximum quantity is 99', true);
            }
        }
    }

    function removeFromCart(index) {
        const cart = getCart();
        if (cart[index]) {
            const removedItem = cart[index];
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
            showToast(`Removed ${removedItem.name} from cart`);
        }
    }

    function clearCart() {
        if (getCart().length === 0) return;
        if (confirm('Are you sure you want to clear your entire cart?')) {
            saveCart([]);
            renderCart();
            showToast('Cart cleared successfully');
        }
    }

    function proceedToCheckout() {
        const cart = getCart();
        if (cart.length === 0) {
            showToast('Your cart is empty! Please add items first.', true);
            return;
        }
        window.location.href = 'checkout.html';
    }

    // Load cart and apply custom logo on page load
    document.addEventListener('DOMContentLoaded', () => {
        // Apply your custom logo
        setCustomLogo();
        renderCart();
        
        // Debug: Log cart contents
        console.log('Cart loaded:', getCart());
        console.log('Custom logo applied. To change logo, edit YOUR_LOGO_URL variable in the script');
    });
</script>
</body>
</html>
