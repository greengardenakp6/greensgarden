            color: white;
            transform: translateX(-4px);
            gap: 12px;
        }

            overflow: hidden;
        }

            box-shadow: 0 8px 20px rgba(251,100,27,0.3);

            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);

        /* main product container */
        .product-container {

            padding: 0 32px;

            gap: 48px;

            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
            position: relative;
        }

        .image-magnifier {
            background: #faf9fc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 480px;
            padding: 32px;
            transition: transform 0.3s ease;
        }

        .product-img {
            max-width: 85%;
            max-height: 380px;

            transition: transform 0.4s cubic-bezier(0.2, 0.95, 0.4, 1.1);
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.08));

            gap: 12px;
            margin-bottom: 20px;

            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;

            align-items: center;

            font-weight: 800;

            letter-spacing: -0.5px;

            left: 50%;

            color: white;

        /* ripple effect for buttons */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10);
            opacity: 0;
            transition: transform 0.4s, opacity 0.8s;
        }
        .ripple:active:after {
            transform: scale(0);
            opacity: 0.4;
            transition: 0s;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.05); opacity: 0; }
        }
        .add-animation {
            animation: pulse 0.4s ease-out;
        }
    </style>
</head>

        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        return cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    }

    // Update cart badge
    function updateCartBadge() {
        const count = getCartCount();
        const badge = document.getElementById('cartCountBadge');
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }
    }

    // show toast with smooth transition
    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        if (isError) {
            toast.style.background = "rgba(220, 53, 69, 0.95)";
            toast.querySelector('i').className = "fas fa-exclamation-circle";
        } else {
            toast.style.background = "rgba(30,42,62,0.95)";
            toast.querySelector('i').className = "fas fa-check-circle";
        }
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2200);
    }

    // add to cart core
    function addToCartHandler(quantity, redirectToBuy = false) {
        if (!currentProduct) return;
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const existingIndex = cart.findIndex(item => item.id === currentProduct.id);
        if (existingIndex !== -1) {
            cart[existingIndex].quantity += quantity;
        } else {
            cart.push({
                id: currentProduct.id,
                name: currentProduct.name,
                price: currentProduct.price,
                image: currentProduct.image,
                quantity: quantity
            });
        }
        localStorage.setItem("cart", JSON.stringify(cart));
        
        // Update cart badge
        updateCartBadge();
        
        if (redirectToBuy) {
            showToast(`✨ ${quantity} item(s) added! Redirecting...`, false);
            setTimeout(() => { window.location.href = 'buy.html'; }, 600);
        } else {
            showToast(`✓ ${quantity} × ${currentProduct.name} added to cart`, false);
            // add ripple effect on button
            const btn = document.getElementById('addToCartBtn');
            btn.classList.add('add-animation');
            setTimeout(() => btn.classList.remove('add-animation'), 300);
        }
    }

    // Render product details
    function renderProductDetails() {
        const id = getProductIdFromUrl();
        currentProduct = products.find(p => p.id === id) || products[0];
        const product = currentProduct;

        document.getElementById('productName').innerText = product.name;
        document.getElementById('currentPrice').innerHTML = `₹${product.price.toLocaleString('en-IN')}`;
        document.getElementById('mainProductImage').src = product.image;
        document.getElementById('productRating').innerHTML = `<i class="fas fa-star"></i> ${product.rating}`;
        document.getElementById('reviewCount').innerHTML = `${product.reviews || (product.rating * 30).toFixed(0)}+ ratings`;
        
        // dynamic discount (fake 8-18% for UI)
        let mrp = Math.round(product.price * (1 + (Math.random() * 0.18 + 0.08)));
        let discountVal = Math.round(((mrp - product.price) / mrp) * 100);
        document.getElementById('originalPrice').innerText = `₹${mrp}`;
        document.getElementById('discountPercent').innerText = `(${discountVal}% off)`;
        
        // custom description per category
        const descMap = {
            "Flower Seeds": "🌸 Premium quality flower seeds with high germination rate. Blooms within 6-8 weeks.",
            "Vegetable Seeds": "🥬 Non-GMO heirloom seeds. Perfect for home garden. Organic & chemical-free.",
            "Plants": "🌿 Healthy live plant delivered in eco-friendly pot. Ready to thrive.",
            "Planters": "🏺 Stylish & durable pots. UV resistant & lightweight design.",
            default: "🌱 Premium quality seeds and plants cultivated with care. Each product comes with detailed growing instructions and our satisfaction guarantee."
        };
        let categoryKey = product.category || "default";
        let dynamicDesc = descMap[categoryKey] || descMap.default;
        document.getElementById('productDesc').innerHTML = dynamicDesc + ` <strong>${product.name}</strong> is a customer favorite!`;
        
        // reset quantity to 1
        document.getElementById('quantityInput').value = 1;
        updateButtonsState(1);
        
        // Update cart badge on load
        updateCartBadge();
    }

    function updateButtonsState(qty) {
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');
        minusBtn.disabled = qty <= 1;
        plusBtn.disabled = qty >= 99;
    }

    function changeQuantity(delta) {
        const input = document.getElementById('quantityInput');
        let val = parseInt(input.value) || 1;
        let newVal = val + delta;
        if (newVal >= 1 && newVal <= 99) {
            input.value = newVal;
            updateButtonsState(newVal);
        }
    }

    // event binding
    document.addEventListener('DOMContentLoaded', () => {
        renderProductDetails();
        
        const minus = document.getElementById('minusBtn');
        const plus = document.getElementById('plusBtn');
        const qtyInput = document.getElementById('quantityInput');
        const addBtn = document.getElementById('addToCartBtn');
        const buyBtn = document.getElementById('buyNowBtn');
        const viewCartBtn = document.getElementById('viewCartBtn');
        
        minus.addEventListener('click', () => changeQuantity(-1));
        plus.addEventListener('click', () => changeQuantity(1));
        qtyInput.addEventListener('input', function() {
            let val = parseInt(this.value) || 1;
            val = Math.min(99, Math.max(1, val));
            this.value = val;
            updateButtonsState(val);
        });
        
        addBtn.addEventListener('click', () => {
            let qty = parseInt(document.getElementById('quantityInput').value) || 1;
            addToCartHandler(qty, false);
        });
        
        buyBtn.addEventListener('click', () => {
            let qty = parseInt(document.getElementById('quantityInput').value) || 1;
            addToCartHandler(qty, true);
        });
        
        viewCartBtn.addEventListener('click', () => {
            window.location.href = 'buy.html';
        });
        
        // back button
        const back = document.querySelector('.back-btn');
        if(back) back.addEventListener('click', (e) => {
            window.location.href = 'products.html';
        });
    });
</script>
</body>
</html>
