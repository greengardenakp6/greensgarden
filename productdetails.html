        .cart-badge {

            color: #fb641b;
            border-radius: 50px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-left: 6px;
        }

        .product-container {

            padding: 0 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
        }

            overflow: hidden;

            border: 1px solid #f0f0f0;
            position: relative;
        }

            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 480px;
            padding: 32px;
        }

        .product-img {

            max-height: 380px;

            transition: transform 0.4s cubic-bezier(0.2, 0.95, 0.4, 1.1);
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.08));

        }

            left: 20px;

            color: #2e7d32;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;

            border: 1px solid #f0f2f5;

        .product-title {

            font-weight: 700;
            line-height: 1.3;
            color: #172337;
            margin-bottom: 12px;
        }

            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

            color: white;

            align-items: center;

            font-weight: 800;
            color: #212121;
        }

            color: #878787;

            color: #388e3c;
            font-weight: 700;
            margin-left: 12px;
            font-size: 1rem;
        }

            margin-top: 5px;

            padding-left: 16px;
            background: #fefcf8;
            border-radius: 12px;

            background: #eef2f5;
            margin: 24px 0;
        }

            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 24px 0;
        }

            font-weight: 600;
            color: #3e4d5b;
        }

            align-items: center;
            background: #f1f3f6;
            border-radius: 44px;

        }

            background: white;
            border: none;
            width: 44px;
            height: 44px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            color: #2874f0;
            transition: all 0.2s;

            background: #2874f0;
            color: white;
        }

        .qty-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

            width: 60px;
            text-align: center;
            border: none;
            background: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 0;

            color: #5f6c76;
            background: #f8f9fc;
            padding: 6px 14px;

            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);

            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 2000;

            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30,42,62,0.95);
            pointer-events: none;
        }

            top: 0;
            left: 0;
            width: 100%;

            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;

            opacity: 1;

// Helper function to get product by ID
function getProductById(id) {
    return products.find(p => p.id === id);
}

function getProductIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get("id"));
    return isNaN(id) ? 1 : id;
}

let currentProduct = null;

function showToast(message, isError = false) {
    const toast = document.getElementById('toastMsg');
    const toastText = document.getElementById('toastText');
    toastText.innerText = message;
    if (isError) {
        toast.style.background = "rgba(220, 53, 69, 0.95)";
        toast.querySelector('i').className = "fas fa-exclamation-circle";
    } else {
        toast.style.background = "rgba(30,42,62,0.95)";
        toast.querySelector('i').className = "fas fa-check-circle";
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
}

function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.getElementById('cartItemCountBadge');
    if(badge) badge.innerText = totalItems;
}

function addToCartHandler(quantity, redirectToBuy = false) {
    if (!currentProduct) return;
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const existingIndex = cart.findIndex(item => item.id === currentProduct.id);
    if (existingIndex !== -1) {
        cart[existingIndex].quantity = (cart[existingIndex].quantity || 1) + quantity;
    } else {
        cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            image: currentProduct.image,
            quantity: quantity
        });
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartBadge();
    if (redirectToBuy) {
        showToast(`✨ ${quantity} item(s) added! Redirecting...`, false);
        setTimeout(() => { window.location.href = 'buy.html'; }, 600);
    } else {
        showToast(`✓ ${quantity} × ${currentProduct.name} added to cart`, false);
    }
}

function renderProductDetails() {
    const id = getProductIdFromUrl();
    currentProduct = getProductById(id) || products[0];
    const product = currentProduct;
    
    document.getElementById('productName').innerText = product.name;
    document.getElementById('currentPrice').innerHTML = `₹${product.price.toLocaleString('en-IN')}`;
    document.getElementById('mainProductImage').src = product.image;
    document.getElementById('productRating').innerHTML = `<i class="fas fa-star"></i> ${product.rating}`;
    document.getElementById('reviewCount').innerHTML = `${product.reviews}+ ratings`;
    
    // Calculate MRP and discount
    let mrp = Math.round(product.price * (1 + (Math.random() * 0.18 + 0.08)));
    let discountVal = Math.round(((mrp - product.price) / mrp) * 100);
    document.getElementById('originalPrice').innerText = `₹${mrp}`;
    document.getElementById('discountPercent').innerText = `(${discountVal}% off)`;
    
    // Category-based description
    const descriptions = {
        "Flower Seeds": "🌸 Premium quality flower seeds with high germination rate. Beautiful blooms within 6-8 weeks. Perfect for home gardens and balconies.",
        "Vegetable Seeds": "🥬 Non-GMO heirloom vegetable seeds. Chemical-free, high yield, perfect for organic home gardening.",
        "Plants": "🌿 Healthy live plant delivered in eco-friendly pot. Ready to thrive with proper care instructions included.",
        "Planters": "🏺 Stylish & durable pots. UV resistant, lightweight design, perfect for indoor and outdoor plants.",
        "Plant Stands": "🪴 Elegant and sturdy plant stands. Space-saving design, perfect for showcasing your favorite plants.",
        "Flower Plants": "🌸 Beautiful flowering plants. Easy to maintain, blooms throughout the season.",
        "Fruit Plants": "🍎 Premium fruit plants. Grafted for early fruiting, perfect for home orchards.",
        "Plant Manure": "🌱 Organic nutrient-rich manure. Enhances soil fertility and promotes healthy plant growth.",
        "Plant Fertilizer": "💪 Premium plant nutrition. Boosts growth, flowering, and fruiting naturally.",
        "Garden Decor": "🎨 Beautiful garden decorations. Enhance the beauty of your green space.",
        "Lawn Seeds": "🌿 Premium grass seeds for lush green lawn. Fast germination, drought resistant.",
        "Oil Seeds": "🌻 High-quality oil seeds for cultivation. Perfect for organic farming.",
        "Fruit Seeds": "🍊 Premium fruit seeds with high germination rate. Grow your own fruit trees.",
        "Pot Stand": "🪑 Elegant pot stands to elevate your plant display."
    };
    
    let description = descriptions[product.category] || "🌱 Premium quality seeds and plants cultivated with care. Each product comes with detailed growing instructions and our satisfaction guarantee.";
    document.getElementById('productDesc').innerHTML = `${description} <strong>${product.name}</strong> is a customer favorite!`;
    document.getElementById('quantityInput').value = 1;
    updateButtonsState(1);
    updateCartBadge();
}

function updateButtonsState(qty) {
    const minusBtn = document.getElementById('minusBtn');
    const plusBtn = document.getElementById('plusBtn');
    minusBtn.disabled = qty <= 1;
    plusBtn.disabled = qty >= 99;
}

function changeQuantity(delta) {
    const input = document.getElementById('quantityInput');
    let val = parseInt(input.value) || 1;
    let newVal = val + delta;
    if (newVal >= 1 && newVal <= 99) {
        input.value = newVal;
        updateButtonsState(newVal);
    }
}

function openCartModal() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById('cartModalItems');
    const totalSpan = document.getElementById('cartModalTotal');
    
    if(cart.length === 0) {
        container.innerHTML = '<div class="empty-cart-msg" style="text-align:center; padding:30px;"><i class="fas fa-bag-shopping" style="font-size:48px; opacity:0.5;"></i><p>Your cart is empty</p></div>';
        totalSpan.innerText = 'Total: ₹0';
    } else {
        let html = '';
        let total = 0;
        cart.forEach(item => {
            const itemTotal = item.price * (item.quantity || 1);
            total += itemTotal;
            html += `<div class="cart-item-row">
                        <div class="cart-item-name"><strong>${escapeHtml(item.name)}</strong> <span style="color:#666;">x ${item.quantity || 1}</span></div>
                        <div class="cart-item-price">₹${itemTotal.toLocaleString('en-IN')}</div>
                     </div>`;
        });
        container.innerHTML = html;
        totalSpan.innerHTML = `Total: ₹${total.toLocaleString('en-IN')}`;
    }
    document.getElementById('cartModal').classList.add('active');
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}

function closeCartModal() {
    document.getElementById('cartModal').classList.remove('active');
}

document.addEventListener('DOMContentLoaded', () => {
    renderProductDetails();
    
    document.getElementById('minusBtn').addEventListener('click', () => changeQuantity(-1));
    document.getElementById('plusBtn').addEventListener('click', () => changeQuantity(1));
    document.getElementById('quantityInput').addEventListener('input', function() {
        let val = parseInt(this.value) || 1;
        val = Math.min(99, Math.max(1, val));
        this.value = val;
        updateButtonsState(val);
    });
    
    document.getElementById('addToCartBtn').addEventListener('click', () => {
        let qty = parseInt(document.getElementById('quantityInput').value) || 1;
        addToCartHandler(qty, false);
    });
    
    document.getElementById('buyNowBtn').addEventListener('click', () => {
        let qty = parseInt(document.getElementById('quantityInput').value) || 1;
        addToCartHandler(qty, true);
    });
    
    document.getElementById('backToShopBtn').addEventListener('click', () => { 
        window.location.href = 'products.html'; 
    });
    
    document.getElementById('viewCartNavBtn').addEventListener('click', openCartModal);
    document.getElementById('closeModalIcon').addEventListener('click', closeCartModal);
    document.getElementById('closeCartBtn').addEventListener('click', closeCartModal);
    document.getElementById('gotoFullCartBtn').addEventListener('click', () => {
        window.location.href = 'cart.html';
    });
    
    const modal = document.getElementById('cartModal');
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeCartModal();
    });
    
    updateCartBadge();
    window.addEventListener('storage', (e) => {
        if (e.key === 'cart') updateCartBadge();
    });
});
</script>
