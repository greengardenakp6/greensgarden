<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f3f6;
            color: #212121;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2874f0;
            border-radius: 10px;
        }

        /* Navbar */
        .navbar-flipkart {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .back-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .back-btn:hover {
            background: #2874f0;
            transform: translateX(-4px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }

        .brand-icon i {
            font-size: 20px;
            color: white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .brand-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-badge {
            font-size: 10px;
            background: #ff9800;
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 8px;
        }

        /* Main Container */
        .orders-main {
            max-width: 1280px;
            margin: 32px auto;
            padding: 0 32px;
        }

        /* Tabs */
        .tabs-wrapper {
            background: white;
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 28px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .tab-item {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 15px;
            color: #878787;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-item.active {
            background: linear-gradient(135deg, #2874f0, #1a5bbf);
            color: white;
            box-shadow: 0 4px 12px rgba(40,116,240,0.3);
        }

        .tab-item:hover:not(.active) {
            background: #f0f2f5;
            color: #2874f0;
        }

        /* Order Cards */
        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .order-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            animation: fadeSlideUp 0.4s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
        }

        /* Order Header */
        .order-header {
            padding: 18px 24px;
            background: #fafbfc;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .order-id {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-id i {
            font-size: 18px;
            color: #2874f0;
        }

        .order-id span {
            font-weight: 700;
            font-size: 15px;
            color: #212121;
        }

        .order-date {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #878787;
        }

        /* Delivery Timeline */
        .delivery-timeline {
            padding: 20px 24px;
            background: linear-gradient(135deg, #fff9f0, #ffffff);
            border-bottom: 1px solid #f0f2f5;
        }

        .timeline-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 20px 0;
        }

        .timeline-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            z-index: 0;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .step-icon {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            transition: all 0.3s;
            position: relative;
            background: white;
        }

        .step.completed .step-icon {
            background: #2e7d32;
            border-color: #2e7d32;
            color: white;
        }

        .step.active .step-icon {
            background: #2874f0;
            border-color: #2874f0;
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40,116,240,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(40,116,240,0); }
        }

        .step-label {
            font-size: 12px;
            font-weight: 600;
            color: #878787;
        }

        .step.completed .step-label,
        .step.active .step-label {
            color: #212121;
            font-weight: 700;
        }

        .step-date {
            font-size: 10px;
            color: #878787;
            margin-top: 4px;
        }

        .delivery-countdown {
            background: #e8f5e9;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .countdown-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #2e7d32;
        }

        .countdown-timer {
            font-size: 20px;
            font-weight: 800;
            font-family: monospace;
            color: #f57c00;
        }

        /* Order Items */
        .order-items {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f2f5;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 0;
        }

        .item-img {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f5f7fa, #ffffff);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #2e7d32;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .item-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #878787;
        }

        .item-price {
            font-weight: 700;
            font-size: 16px;
            color: #2874f0;
        }

        /* Price Details */
        .price-details {
            padding: 20px 24px;
            background: #fafbfc;
            border-bottom: 1px solid #f0f2f5;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .price-row.total {
            border-top: 2px dashed #e0e0e0;
            margin-top: 8px;
            padding-top: 12px;
            font-weight: 800;
            font-size: 18px;
            color: #212121;
        }

        /* Order Footer */
        .order-footer {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .btn-invoice {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-invoice:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46,125,50,0.3);
        }

        .btn-track {
            background: transparent;
            border: 1.5px solid #2874f0;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: #2874f0;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-track:hover {
            background: #2874f0;
            color: white;
        }

        /* Invoice Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #878787;
        }

        .invoice-content {
            padding: 24px;
        }

        .invoice-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .invoice-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .invoice-logo i {
            font-size: 30px;
            color: white;
        }

        .invoice-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .invoice-subtitle {
            font-size: 12px;
            color: #878787;
        }

        .invoice-details {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .invoice-items {
            margin: 16px 0;
        }

        .invoice-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 13px;
        }

        .invoice-total {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #f0f2f5;
            display: flex;
            gap: 12px;
        }

        .btn-download {
            flex: 1;
            background: linear-gradient(135deg, #2874f0, #1a5bbf);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(33,33,33,0.95);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .orders-main {
                padding: 0 16px;
            }
            .timeline-steps {
                flex-direction: column;
                gap: 16px;
            }
            .timeline-steps::before {
                display: none;
            }
            .step {
                display: flex;
                align-items: center;
                gap: 16px;
                text-align: left;
            }
            .step-icon {
                margin: 0;
            }
        }
    </style>
</head>
<body>

<nav class="navbar-flipkart">
    <div class="nav-left">
        <button class="back-btn" onclick="window.location.href='products.html'">

        </div>
        <div id="invoiceContent"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // Orders Data
    let orders = [
        {
            orderId: "OD337056723948732200",
            date: "2026-03-22T10:30:00",
            status: "out_for_delivery",
            items: [
                { name: "Kilos Basket", price: 448, quantity: 1, originalPrice: 515, icon: "fa-basket-shopping" }
            ],
            listingPrice: 515,
            sellingPrice: 448,
            totalFees: 31,
            total: 479,
            paymentMethod: "Cash On Delivery",
            deliveryAddress: {
                name: "Akash",
                phone: "9994458119",
                address: "127/F HOSPITAL ROAD, MELPADI KALLAKURICHI, Tamil Nadu"
            },
            tracking: {

                outForDelivery: { date: "2026-03-24", time: "09:00 AM", completed: true },
                delivered: { date: "2026-03-24", time: "11:00 PM", completed: false, expected: true }
            }
        },
        {
            orderId: "OD337056723948732201",
            date: "2026-03-20T14:20:00",
            status: "shipped",
            items: [
                { name: "Morning Jewel Rose Seed", price: 158, quantity: 2, originalPrice: 180, icon: "fa-rose" },
                { name: "Organic Potting Mix", price: 360, quantity: 1, originalPrice: 400, icon: "fa-droplet" }
            ],
            listingPrice: 580,
            sellingPrice: 518,
            totalFees: 35,
            total: 676,
            paymentMethod: "UPI",
            deliveryAddress: {
                name: "Olivia Chen",
                phone: "9876543210",
                address: "42 Greenway Blvd, Austin, TX 78701"
            },
            tracking: {
                orderConfirmed: { date: "2026-03-20", time: "02:20 PM", completed: true },
                shipped: { date: "2026-03-22", time: "11:30 AM", completed: true },
                outForDelivery: { date: "2026-03-24", time: "08:00 AM", completed: false, expected: true },
                delivered: { date: "2026-03-25", time: "06:00 PM", completed: false, expected: true }
            }
        },
        {
            orderId: "OD337056723948732202",
            date: "2026-03-18T09:15:00",
            status: "delivered",
            items: [
                { name: "Brazilian Wood Plant", price: 550, quantity: 1, originalPrice: 620, icon: "fa-tree" }
            ],
            listingPrice: 620,
            sellingPrice: 550,
            totalFees: 28,
            total: 578,
            paymentMethod: "Card",
            deliveryAddress: {
                name: "Olivia Chen",
                phone: "9876543210",
                address: "42 Greenway Blvd, Austin, TX 78701"
            },
            tracking: {
                orderConfirmed: { date: "2026-03-18", time: "09:15 AM", completed: true },
                shipped: { date: "2026-03-19", time: "01:45 PM", completed: true },
                outForDelivery: { date: "2026-03-20", time: "10:00 AM", completed: true },
                delivered: { date: "2026-03-20", time: "03:30 PM", completed: true }
            }
        }
    ];

    // Real-time delivery calculation
    function calculateRealTimeDelivery(tracking) {
        const now = new Date();
        const deliveryDate = new Date(tracking.delivered.date);
        
        if (tracking.delivered.completed) {
            return { status: "delivered", message: "Delivered on " + formatDate(deliveryDate), timeLeft: null };
        }
        
        if (tracking.outForDelivery.completed) {
            const deliveryTime = new Date(tracking.delivered.date + " " + tracking.delivered.time);
            const timeDiff = deliveryTime - now;
            
            if (timeDiff > 0) {
                const hours = Math.floor(timeDiff / (1000 * 60 * 60));
                const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
                return { 
                    status: "out_for_delivery", 
                    message: "Out for delivery", 
                    timeLeft: `${hours}h ${minutes}m`,
                    expected: formatTime(deliveryTime)
                };
            } else {
                return { status: "delivering", message: "Your order is almost there!", timeLeft: null };
            }
        }
        
        if (tracking.shipped.completed) {
            const outDate = new Date(tracking.outForDelivery.date);
            return { status: "shipped", message: "Shipped • Expected by " + formatDate(outDate), timeLeft: null };
        }
        
        return { status: "confirmed", message: "Order confirmed", timeLeft: null };
    }

    function formatDate(date) {
        return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatTime(date) {
        return new Date(date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    // Get status class
    function getStatusClass(status) {
        const classes = {
            confirmed: 'status-processing',
            shipped: 'status-shipped',
            out_for_delivery: 'status-shipped',
            delivering: 'status-shipped',
            delivered: 'status-delivered'
        };
        return classes[status] || 'status-processing';
    }

    // Generate Invoice HTML
    function generateInvoice(order) {
        return `
            <div class="invoice-content">
                <div class="invoice-header">
                    <div class="invoice-logo">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <div class="invoice-title">GREEN GARDEN</div>
                    <div class="invoice-subtitle">Organic & Natural Products</div>
                    <div class="invoice-subtitle">GST: 33ABCDE1234F1Z5</div>
                </div>
                
                <div class="invoice-details">
                    <div class="invoice-row"><strong>Invoice No:</strong> ${order.orderId}</div>
                    <div class="invoice-row"><strong>Invoice Date:</strong> ${new Date().toLocaleDateString()}</div>
                    <div class="invoice-row"><strong>Order Date:</strong> ${new Date(order.date).toLocaleDateString()}</div>
                    <div class="invoice-row"><strong>Payment Method:</strong> ${order.paymentMethod}</div>
                </div>
                
                <div class="invoice-details">
                    <div class="invoice-row"><strong>Sold By:</strong> Green Garden Organic Store</div>
                    <div class="invoice-row"><strong>Delivered To:</strong> ${order.deliveryAddress.name}</div>
                    <div class="invoice-row"><strong>Address:</strong> ${order.deliveryAddress.address}</div>
                    <div class="invoice-row"><strong>Phone:</strong> ${order.deliveryAddress.phone}</div>
                </div>
                
                <div class="invoice-items">
                    <div style="font-weight:700; margin-bottom:12px;">Item Details</div>
                    ${order.items.map(item => `
                        <div class="invoice-item">
                            <div>${item.name} x ${item.quantity}</div>
                            <div>₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="invoice-total">
                    <div class="invoice-row"><span>Listing Price:</span><span>₹${order.listingPrice}</span></div>
                    <div class="invoice-row"><span>Selling Price:</span><span>₹${order.sellingPrice}</span></div>
                    <div class="invoice-row"><span>Total Fees:</span><span>₹${order.totalFees}</span></div>
                    <div class="invoice-row" style="font-weight:800; font-size:16px; margin-top:8px; border-top:1px solid #ddd; padding-top:8px;">
                        <span>Total Amount:</span><span>₹${order.total}</span>
                    </div>
                </div>
                
                <div style="text-align: center; font-size: 11px; color: #878787; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f0f2f5;">
                    <i class="fas fa-check-circle"></i> This is a computer generated invoice • No signature required
                </div>
            </div>
        `;
    }

    // Download PDF
    function downloadPDF(order) {
        const element = document.createElement('div');
        element.innerHTML = generateInvoice(order);
        element.style.padding = '20px';
        element.style.background = 'white';
        
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: `Invoice_${order.orderId}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save();
        showToast(`Invoice downloaded for Order #${order.orderId.slice(-6)}`);
    }

    // Show Invoice Modal
    function showInvoiceModal(order) {
        const modal = document.getElementById('invoiceModal');
        const invoiceContent = document.getElementById('invoiceContent');
        invoiceContent.innerHTML = generateInvoice(order);
        
        const downloadBtn = document.createElement('div');
        downloadBtn.className = 'modal-footer';
        downloadBtn.innerHTML = `
            <button class="btn-download" onclick="downloadPDF(window.currentOrder)">
                <i class="fas fa-download"></i> Download PDF
            </button>
        `;
        invoiceContent.appendChild(downloadBtn);
        
        window.currentOrder = order;
        modal.classList.add('active');
    }

    function closeInvoiceModal() {
        document.getElementById('invoiceModal').classList.remove('active');
    }

    // Show Toast
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Render Orders
    function renderOrders(tab = 'active') {
        const container = document.getElementById('ordersContainer');
        
        let filteredOrders = orders;
        if (tab === 'active') {
            filteredOrders = orders.filter(o => o.status !== 'delivered');
        } else {
            filteredOrders = orders.filter(o => o.status === 'delivered');
        }
        
        if (filteredOrders.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 80px; background: white; border-radius: 28px;">
                    <i class="fas fa-seedling" style="font-size: 64px; color: #cbd5e1; margin-bottom: 20px;"></i>
                    <h3>No orders found</h3>
                    <p style="color: #878787; margin-top: 8px;">${tab === 'active' ? 'You have no active orders.' : 'Your order history is empty.'}</p>
                    <button class="btn-invoice" style="margin-top: 20px;" onclick="window.location.href='products.html'">Start Shopping</button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filteredOrders.map(order => {
            const deliveryStatus = calculateRealTimeDelivery(order.tracking);
            const steps = [
                { key: 'orderConfirmed', label: 'Order Confirmed', icon: 'fa-check-circle' },
                { key: 'shipped', label: 'Shipped', icon: 'fa-truck' },
                { key: 'outForDelivery', label: 'Out For Delivery', icon: 'fa-truck-fast' },
                { key: 'delivered', label: 'Delivered', icon: 'fa-check-double' }
            ];
            
            return `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-id">
                            <i class="fas fa-receipt"></i>
                            <span>Order #${order.orderId.slice(-12)}</span>
                        </div>
                        <div class="order-date">
                            <i class="far fa-calendar-alt"></i>
                            ${new Date(order.date).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' })}
                        </div>
                    </div>
                    
                    <div class="delivery-timeline">
                        <div class="timeline-steps">
                            ${steps.map((step, idx) => {
                                const isCompleted = order.tracking[step.key]?.completed;
                                const isActive = deliveryStatus.status === step.key || 
                                    (step.key === 'outForDelivery' && deliveryStatus.status === 'delivering');
                                return `
                                    <div class="step ${isCompleted ? 'completed' : (isActive ? 'active' : '')}">
                                        <div class="step-icon">
                                            <i class="fas ${step.icon}"></i>
                                        </div>
                                        <div class="step-label">${step.label}</div>
                                        ${order.tracking[step.key]?.date ? `<div class="step-date">${formatDate(order.tracking[step.key].date)}</div>` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        
                        ${deliveryStatus.timeLeft ? `
                            <div class="delivery-countdown">
                                <div class="countdown-text">
                                    <i class="fas fa-clock"></i>
                                    <span>${deliveryStatus.message}</span>
                                </div>
                                <div class="countdown-timer">${deliveryStatus.timeLeft} left</div>
                            </div>
                        ` : `
                            <div class="delivery-countdown" style="background: #f5f5f5;">
                                <div class="countdown-text">
                                    <i class="fas ${deliveryStatus.status === 'delivered' ? 'fa-check-circle' : 'fa-truck'}"></i>
                                    <span>${deliveryStatus.message}</span>
                                </div>
                            </div>
                        `}
                    </div>
                    
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <div class="item-img">
                                    <i class="fas ${item.icon}"></i>
                                </div>
                                <div class="item-details">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-meta">
                                        <span>Qty: ${item.quantity}</span>
                                        <span>₹${item.price} each</span>
                                    </div>
                                </div>
                                <div class="item-price">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="price-details">
                        <div class="price-row"><span>Listing price</span><span>₹${order.listingPrice}</span></div>
                        <div class="price-row"><span>Selling price</span><span>₹${order.sellingPrice}</span></div>
                        <div class="price-row"><span>Total fees</span><span>₹${order.totalFees}</span></div>
                        <div class="price-row total"><span>Total amount</span><span>₹${order.total}</span></div>
                        <div class="price-row" style="margin-top: 8px;"><span>Payment method</span><span>${order.paymentMethod}</span></div>
                    </div>
                    
                    <div class="order-footer">
                        <button class="btn-invoice" onclick="showInvoiceModal(${JSON.stringify(order).replace(/"/g, '&quot;')})">
                            <i class="fas fa-file-invoice"></i> View Invoice
                        </button>
                        <button class="btn-track" onclick="showToast('Tracking: ${order.status === 'delivered' ? 'Order delivered successfully!' : 'Your order is on the way!')}">
                            <i class="fas fa-map-marker-alt"></i> Track Order
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Tab switching
    document.querySelectorAll('.tab-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders(btn.dataset.tab);
        });
    });

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('invoiceModal');
        if (event.target === modal) {
            closeInvoiceModal();
        }
    };

    // Initial render
    renderOrders('active');
</script>
</body>
</html>
