<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Orders | Green Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f3f6;
            color: #212121;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2874f0;
            border-radius: 10px;
        }

        .navbar-flipkart {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .back-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #2874f0;
            transform: translateX(-4px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon i {
            font-size: 20px;
            color: white;
        }

        .brand-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .orders-main {
            max-width: 1280px;
            margin: 32px auto;
            padding: 0 32px;
        }

        .tabs-wrapper {
            background: white;
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 28px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .tab-item {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 15px;
            color: #878787;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-item.active {
            background: linear-gradient(135deg, #2874f0, #1a5bbf);
            color: white;
            box-shadow: 0 4px 12px rgba(40,116,240,0.3);
        }

        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .order-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            animation: fadeSlideUp 0.4s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
        }

        .order-header {
            padding: 18px 24px;
            background: #fafbfc;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .order-id {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-id i {
            font-size: 18px;
            color: #2874f0;
        }

        .order-id span {
            font-weight: 700;
            font-size: 15px;
        }

        .order-date {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #878787;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-processing {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-shipped {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-delivered {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .delivery-timeline {
            padding: 20px 24px;
            background: linear-gradient(135deg, #fff9f0, #ffffff);
            border-bottom: 1px solid #f0f2f5;
        }

        .timeline-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 20px 0;
        }

        .timeline-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            z-index: 0;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .step-icon {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            transition: all 0.3s;
        }

        .step.completed .step-icon {
            background: #2e7d32;
            border-color: #2e7d32;
            color: white;
        }

        .step.active .step-icon {
            background: #2874f0;
            border-color: #2874f0;
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .step-label {
            font-size: 12px;
            font-weight: 600;
            color: #878787;
        }

        .step.completed .step-label,
        .step.active .step-label {
            color: #212121;
        }

        .delivery-countdown {
            background: #e8f5e9;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .countdown-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #2e7d32;
        }

        .order-items {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f2f5;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
        }

        .item-img {
            width: 70px;
            height: 70px;
            background: #f8f9fa;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-img i {
            font-size: 28px;
            color: #2e7d32;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .item-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #878787;
        }

        .item-price {
            font-weight: 700;
            font-size: 16px;
            color: #2874f0;
        }

        .price-details {
            padding: 20px 24px;
            background: #fafbfc;
            border-bottom: 1px solid #f0f2f5;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .price-row.total {
            border-top: 2px dashed #e0e0e0;
            margin-top: 8px;
            padding-top: 12px;
            font-weight: 800;
            font-size: 18px;
        }

        .order-footer {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .btn-invoice {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-invoice:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46,125,50,0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .invoice-content {
            padding: 24px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #f0f2f5;
        }

        .btn-download {
            width: 100%;
            background: linear-gradient(135deg, #2874f0, #1a5bbf);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(33,33,33,0.95);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            z-index: 2000;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .orders-main {
                padding: 0 16px;
            }
            .timeline-steps {
                flex-direction: column;
                gap: 16px;
            }
            .timeline-steps::before {
                display: none;
            }
            .step {
                display: flex;
                align-items: center;
                gap: 16px;
                text-align: left;
            }
            .step-icon {
                margin: 0;
            }
            .order-item {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<nav class="navbar-flipkart">
    <div class="nav-left">
        <button class="back-btn" onclick="window.location.href='products.html'">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Shop</span>
        </button>
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <div class="brand-text">GREEN GARDEN</div>
        </div>
    </div>
</nav>

<div class="orders-main">
    <div class="tabs-wrapper">
        <button class="tab-item active" data-tab="active">
            <i class="fas fa-box"></i>
            <span>Active Orders</span>
        </button>
        <button class="tab-item" data-tab="history">
            <i class="fas fa-history"></i>
            <span>Order History</span>
        </button>
    </div>

    <div id="ordersContainer" class="orders-grid"></div>
</div>

<div id="invoiceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-invoice"></i> Tax Invoice</h3>
            <button class="close-modal" onclick="closeInvoiceModal()">&times;</button>
        </div>
        <div id="invoiceContent"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let orders = [];

    function loadOrders() {
        const savedOrders = localStorage.getItem('green_garden_orders');
        if (savedOrders) {
            orders = JSON.parse(savedOrders);
        }
        
        // If no orders, add demo order for preview
        if (orders.length === 0) {
            const demoOrder = {
                orderId: "OD337056723948732200",
                date: new Date().toISOString(),
                status: "processing",
                items: [
                    { name: "Kilos Basket", price: 448, quantity: 1, originalPrice: 515, icon: "fa-basket-shopping", image: null }
                ],
                listingPrice: 515,
                sellingPrice: 448,
                totalFees: 31,
                total: 479,
                paymentMethod: "Cash On Delivery",
                deliveryAddress: {
                    name: "Akash Kumar",
                    phone: "9994458119",
                    address: "127/F HOSPITAL ROAD, MELPADI KALLAKURICHI, Tamil Nadu - 606202"
                },
                tracking: {
                    orderConfirmed: { date: new Date().toISOString(), time: "10:30 AM", completed: true },
                    shipped: { date: new Date(Date.now() + 86400000).toISOString(), time: "02:15 PM", completed: false, expected: true },
                    outForDelivery: { date: new Date(Date.now() + 172800000).toISOString(), time: "09:00 AM", completed: false, expected: true },
                    delivered: { date: new Date(Date.now() + 259200000).toISOString(), time: "08:00 PM", completed: false, expected: true }
                }
            };
            orders.push(demoOrder);
            localStorage.setItem('green_garden_orders', JSON.stringify(orders));
        }
        
        renderOrders('active');
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getStatusClass(status) {
        const classes = {
            processing: 'status-processing',
            shipped: 'status-shipped',
            out_for_delivery: 'status-shipped',
            delivered: 'status-delivered'
        };
        return classes[status] || 'status-processing';
    }

    function getStatusText(status) {
        const texts = {
            processing: 'Processing',
            shipped: 'Shipped',
            out_for_delivery: 'Out for Delivery',
            delivered: 'Delivered'
        };
        return texts[status] || status;
    }

    function getStatusIcon(status) {
        const icons = {
            processing: 'fa-spinner fa-pulse',
            shipped: 'fa-truck',
            out_for_delivery: 'fa-truck-fast',
            delivered: 'fa-check-circle'
        };
        return icons[status] || 'fa-clock';
    }

    function getIconForProduct(name) {
        const nameLower = name.toLowerCase();
        if (nameLower.includes('rose')) return 'fa-rose';
        if (nameLower.includes('basket')) return 'fa-basket-shopping';
        if (nameLower.includes('seed')) return 'fa-leaf';
        if (nameLower.includes('pot')) return 'fa-flask';
        if (nameLower.includes('plant')) return 'fa-tree';
        if (nameLower.includes('mix')) return 'fa-droplet';
        return 'fa-seedling';
    }

    function renderOrders(tab) {
        const container = document.getElementById('ordersContainer');
        
        let filteredOrders = orders;
        if (tab === 'active') {
            filteredOrders = orders.filter(o => o.status !== 'delivered');
        } else {
            filteredOrders = orders.filter(o => o.status === 'delivered');
        }
        
        if (filteredOrders.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 80px; background: white; border-radius: 28px;">
                    <i class="fas fa-seedling" style="font-size: 64px; color: #cbd5e1; margin-bottom: 20px;"></i>
                    <h3>No orders found</h3>
                    <p style="color: #878787; margin-top: 8px;">${tab === 'active' ? 'You have no active orders.' : 'Your order history is empty.'}</p>
                    <button class="btn-invoice" style="margin-top: 20px;" onclick="window.location.href='products.html'">Start Shopping</button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filteredOrders.map(order => {
            const steps = [
                { key: 'orderConfirmed', label: 'Order Confirmed', icon: 'fa-check-circle' },
                { key: 'shipped', label: 'Shipped', icon: 'fa-truck' },
                { key: 'outForDelivery', label: 'Out For Delivery', icon: 'fa-truck-fast' },
                { key: 'delivered', label: 'Delivered', icon: 'fa-check-double' }
            ];
            
            const isDelivered = order.status === 'delivered';
            
            return `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-id">
                            <i class="fas fa-receipt"></i>
                            <span>Order #${order.orderId.slice(-12)}</span>
                        </div>
                        <div class="order-date">
                            <i class="far fa-calendar-alt"></i>
                            ${new Date(order.date).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' })}
                        </div>
                        <div class="status-badge ${getStatusClass(order.status)}">
                            <i class="fas ${getStatusIcon(order.status)}"></i>
                            ${getStatusText(order.status)}
                        </div>
                    </div>
                    
                    <div class="delivery-timeline">
                        <div class="timeline-steps">
                            ${steps.map((step, idx) => {
                                const isCompleted = order.tracking[step.key]?.completed;
                                const isActive = !isCompleted && !isDelivered && idx === 1;
                                return `
                                    <div class="step ${isCompleted ? 'completed' : (isActive ? 'active' : '')}">
                                        <div class="step-icon">
                                            <i class="fas ${step.icon}"></i>
                                        </div>
                                        <div class="step-label">${step.label}</div>
                                        ${order.tracking[step.key]?.date ? `<div class="step-date">${formatDate(order.tracking[step.key].date)}</div>` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        
                        <div class="delivery-countdown">
                            <div class="countdown-text">
                                <i class="fas ${order.status === 'delivered' ? 'fa-check-circle' : 'fa-truck'}"></i>
                                <span>${order.status === 'delivered' ? 'Delivered successfully!' : 'Your order is on the way!'}</span>
                            </div>
                            ${!isDelivered ? `<div class="countdown-timer">Expected by ${formatDate(order.tracking.delivered.date)}</div>` : ''}
                        </div>
                    </div>
                    
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <div class="item-img">
                                    ${item.image ? 
                                        `<img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<i class=\'fas ${item.icon || getIconForProduct(item.name)}\'></i>'">` : 
                                        `<i class="fas ${item.icon || getIconForProduct(item.name)}"></i>`
                                    }
                                </div>
                                <div class="item-details">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-meta">
                                        <span>Qty: ${item.quantity}</span>
                                        <span>₹${item.price} each</span>
                                    </div>
                                </div>
                                <div class="item-price">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="price-details">
                        <div class="price-row"><span>Listing price</span><span>₹${order.listingPrice}</span></div>
                        <div class="price-row"><span>Selling price</span><span>₹${order.sellingPrice}</span></div>
                        <div class="price-row"><span>Total fees</span><span>₹${order.totalFees}</span></div>
                        <div class="price-row total"><span>Total amount</span><span>₹${order.total}</span></div>
                        <div class="price-row"><span>Payment method</span><span>${order.paymentMethod}</span></div>
                    </div>
                    
                    <div class="order-footer">
                        <button class="btn-invoice" onclick="showInvoiceModal(${JSON.stringify(order).replace(/"/g, '&quot;')})">
                            <i class="fas fa-file-invoice"></i> View Invoice
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function generateInvoiceHTML(order) {
        return `
            <div class="invoice-content">
                <div style="text-align: center; margin-bottom: 24px;">
                    <div class="brand-icon" style="margin: 0 auto 12px; width: 50px; height: 50px;">
                        <i class="fas fa-leaf" style="font-size: 24px;"></i>
                    </div>
                    <div style="font-size: 20px; font-weight: 800;">GREEN GARDEN</div>
                    <div style="font-size: 12px; color: #878787;">Organic & Natural Products</div>
                    <div style="font-size: 11px; color: #878787;">GST: 33ABCDE1234F1Z5</div>
                </div>
                
                <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; margin: 16px 0;">
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Invoice No:</strong> ${order.orderId}</div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Invoice Date:</strong> ${new Date().toLocaleDateString()}</div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Order Date:</strong> ${new Date(order.date).toLocaleDateString()}</div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Payment Method:</strong> ${order.paymentMethod}</div>
                </div>
                
                <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; margin: 16px 0;">
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Sold By:</strong> Green Garden Organic Store</div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Delivered To:</strong> ${order.deliveryAddress.name}</div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Address:</strong> ${order.deliveryAddress.address}</div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><strong>Phone:</strong> ${order.deliveryAddress.phone}</div>
                </div>
                
                <div style="margin: 16px 0;">
                    <div style="font-weight: 700; margin-bottom: 12px;">Item Details</div>
                    ${order.items.map(item => `
                        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f2f5;">
                            <div>${item.name} x ${item.quantity}</div>
                            <div>₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div style="background: #f8f9fa; padding: 16px; border-radius: 12px; margin-top: 16px;">
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><span>Listing Price:</span><span>₹${order.listingPrice}</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><span>Selling Price:</span><span>₹${order.sellingPrice}</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 6px 0;"><span>Total Fees:</span><span>₹${order.totalFees}</span></div>
                    <div style="display: flex; justify-content: space-between; padding: 12px 0 6px; border-top: 1px solid #ddd; margin-top: 8px; font-weight: 800; font-size: 16px;">
                        <span>Total Amount:</span><span>₹${order.total}</span>
                    </div>
                </div>
                
                <div style="text-align: center; font-size: 10px; color: #878787; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f0f2f5;">
                    <i class="fas fa-check-circle"></i> This is a computer generated invoice • No signature required
                </div>
            </div>
        `;
    }

    function showInvoiceModal(order) {
        const modal = document.getElementById('invoiceModal');
        const invoiceContent = document.getElementById('invoiceContent');
        invoiceContent.innerHTML = generateInvoiceHTML(order);
        
        const downloadBtn = document.createElement('div');
        downloadBtn.className = 'modal-footer';
        downloadBtn.innerHTML = `
            <button class="btn-download" onclick="downloadInvoice(${JSON.stringify(order).replace(/"/g, '&quot;')})">
                <i class="fas fa-download"></i> Download PDF
            </button>
        `;
        invoiceContent.appendChild(downloadBtn);
        
        modal.classList.add('active');
    }

    function downloadInvoice(order) {
        const element = document.createElement('div');
        element.innerHTML = generateInvoiceHTML(order);
        element.style.padding = '20px';
        element.style.background = 'white';
        
        html2pdf().set({
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: `Invoice_${order.orderId}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
        
        showToast(`Invoice downloaded for Order #${order.orderId.slice(-6)}`);
    }

    function closeInvoiceModal() {
        document.getElementById('invoiceModal').classList.remove('active');
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Tab switching
    document.querySelectorAll('.tab-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders(btn.dataset.tab);
        });
    });

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('invoiceModal');
        if (event.target === modal) {
            closeInvoiceModal();
        }
    };

    // Initialize
    loadOrders();
</script>
</body>
</html>
