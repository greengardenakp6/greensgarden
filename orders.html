<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Orders | Green Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e293b;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        /* Navbar */
        .navbar-premium {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 16px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        .back-btn, .cart-link {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover, .cart-link:hover {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }

        .brand-icon i {
            font-size: 22px;
            color: white;
        }

        .brand-text {
            font-size: 24px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #fff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .orders-main {
            max-width: 1280px;
            margin: 32px auto;
            padding: 0 32px;
        }

        /* Tabs */
        .tabs-premium {
            background: white;
            border-radius: 20px;
            padding: 8px;
            margin-bottom: 32px;
            display: flex;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eef2ff;
        }

        .tab-premium {
            flex: 1;
            padding: 14px 24px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 15px;
            color: #64748b;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-premium.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 8px 20px rgba(59,130,246,0.25);
        }

        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Order Card */
        .order-card-premium {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }

        .order-card-premium:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }

        .order-header-premium {
            padding: 22px 28px;
            background: linear-gradient(135deg, #fafcff, #ffffff);
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .order-id-premium {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .order-id-premium i {
            font-size: 22px;
            color: #3b82f6;
        }

        .order-id-premium span {
            font-weight: 800;
            font-size: 16px;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .order-date-premium {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
            background: #f8fafc;
            padding: 6px 14px;
            border-radius: 40px;
        }

        .status-badge-premium {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #fed7aa; color: #9a3412; }
        .status-out_for_delivery { background: #fef3c7; color: #b45309; }
        .status-delivered { background: #d1fae5; color: #065f46; }

        /* Timeline */
        .delivery-timeline-premium {
            padding: 28px 28px;
            background: linear-gradient(135deg, #fefce8, #ffffff);
            border-bottom: 1px solid #f1f5f9;
        }

        .timeline-premium {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 20px 0;
        }

        .timeline-premium::before {
            content: '';
            position: absolute;
            top: 24px;
            left: 40px;
            right: 40px;
            height: 3px;
            background: linear-gradient(90deg, #e2e8f0, #cbd5e1, #e2e8f0);
            z-index: 0;
            border-radius: 3px;
        }

        .timeline-step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .timeline-icon {
            width: 48px;
            height: 48px;
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 20px;
        }

        .timeline-step.completed .timeline-icon {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .timeline-step.active .timeline-icon {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            animation: pulseGlow 1.5s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(59,130,246,0.2); }
        }

        .timeline-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
        }

        .timeline-step.completed .timeline-label,
        .timeline-step.active .timeline-label {
            color: #1e293b;
        }

        .delivery-banner {
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            padding: 14px 20px;
            border-radius: 20px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Items */
        .order-items-premium {
            padding: 24px 28px;
            border-bottom: 1px solid #f1f5f9;
        }

        .order-item-premium {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .order-item-premium:last-child {
            border-bottom: none;
        }

        .item-img-premium {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f1f5f9, #fef9e3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .item-img-premium i {
            font-size: 36px;
            color: #10b981;
        }

        .item-details-premium {
            flex: 1;
        }

        .item-name-premium {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
            color: #0f172a;
        }

        .item-meta-premium {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #64748b;
        }

        .item-price-premium {
            font-weight: 800;
            font-size: 18px;
            color: #3b82f6;
        }

        /* Price Details */
        .price-details-premium {
            padding: 20px 28px;
            background: #fafcff;
            border-bottom: 1px solid #f1f5f9;
        }

        .price-row-premium {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
        }

        .price-row-premium.total-premium {
            border-top: 2px solid #e2e8f0;
            margin-top: 12px;
            padding-top: 16px;
            font-weight: 800;
            font-size: 20px;
            color: #0f172a;
        }

        .order-footer-premium {
            padding: 20px 28px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-invoice-premium {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }

        .btn-invoice-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16,185,129,0.4);
        }

        /* Modal */
        .modal-premium {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-premium.active {
            display: flex;
        }

        .modal-content-premium {
            background: white;
            border-radius: 32px;
            max-width: 800px; /* Wider for invoice */
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .modal-header-premium {
            padding: 24px 28px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .close-modal-premium {
            background: #f1f5f9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .toast-premium {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            z-index: 2000;
            transition: all 0.3s;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .toast-premium.show {
            transform: translateX(-50%) translateY(0);
        }

        .empty-state-premium {
            text-align: center;
            padding: 80px;
            background: white;
            border-radius: 32px;
        }

        @media (max-width: 768px) {
            .navbar-premium { padding: 12px 20px; }
            .orders-main { padding: 0 16px; }
            .timeline-premium { flex-direction: column; gap: 20px; }
            .timeline-premium::before { display: none; }
            .timeline-step { display: flex; align-items: center; gap: 16px; text-align: left; }
            .timeline-icon { margin: 0; }
        }
    </style>
</head>
<body>

<nav class="navbar-premium">
    <div class="nav-left">
        <button class="back-btn" id="backToShopBtn">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Shop</span>
        </button>
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <div class="brand-text">GREEN GARDEN</div>
        </div>
    </div>
    <button class="cart-link" id="viewCartBtn">
        <i class="fas fa-shopping-bag"></i>
        <span>My Cart</span>
    </button>
</nav>

<div class="orders-main">
    <div class="tabs-premium">
        <button class="tab-premium active" data-tab="active">
            <i class="fas fa-clock"></i>
            <span>Active Orders</span>
        </button>
        <button class="tab-premium" data-tab="history">
            <i class="fas fa-check-circle"></i>
            <span>Order History</span>
        </button>
    </div>

    <div id="ordersContainer" class="orders-grid"></div>
</div>

<div id="invoiceModal" class="modal-premium">
    <div class="modal-content-premium">
        <div class="modal-header-premium">
            <h3 style="font-size: 1.4rem; font-weight: 700;"><i class="fas fa-file-invoice"></i> Order Invoice</h3>
            <button class="close-modal-premium" onclick="closeInvoiceModal()">&times;</button>
        </div>
        <div id="invoiceContent" style="padding: 0;"></div>
    </div>
</div>

<div id="toast" class="toast-premium"></div>

<script>
    let orders = [];

    // 1. Configuration for Incoming Orders from "Buy Page"
    // Checks localStorage for a pending order, adds it, then clears the key.
    function checkForNewOrder() {
        const pendingOrder = localStorage.getItem('green_garden_pending_order');
        if (pendingOrder) {
            try {
                const newOrder = JSON.parse(pendingOrder);
                // Format the incoming order to match our structure
                const formattedOrder = formatIncomingOrder(newOrder);
                orders.unshift(formattedOrder); // Add to top
                localStorage.setItem('green_garden_premium_orders', JSON.stringify(orders));
                localStorage.removeItem('green_garden_pending_order'); // Clear pending
                showToast("✓ New order placed successfully!");
            } catch (e) {
                console.error("Error parsing pending order", e);
            }
        }
    }

    function formatIncomingOrder(rawOrder) {
        const now = new Date();
        return {
            orderId: "INV" + Date.now().toString().slice(-6),
            date: now.toISOString(),
            status: "processing",
            items: rawOrder.items.map(i => ({
                name: i.name || "Product",
                price: i.price || 0,
                quantity: i.quantity || 1,
                icon: i.icon || "fa-leaf"
            })),
            listingPrice: rawOrder.total || 0,
            sellingPrice: rawOrder.total || 0,
            totalFees: 0,
            total: rawOrder.total || 0,
            paymentMethod: rawOrder.paymentMethod || "COD",
            deliveryAddress: rawOrder.address || { name: "Customer", address: "Address Not Provided", phone: "N/A" },
            tracking: {
                confirmed: { date: now, completed: true },
                shipped: { date: new Date(now.getTime() + 86400000), completed: false },
                outForDelivery: { date: new Date(now.getTime() + 172800000), completed: false },
                delivered: { date: new Date(now.getTime() + 259200000), completed: false }
            }
        };
    }

    function generatePremiumOrders() {
        const today = new Date();
        const getDate = (days) => {
            const d = new Date(today);
            d.setDate(today.getDate() + days);
            return d;
        };

        return [
            {
                orderId: "INV00001",
                date: getDate(-2).toISOString(),
                status: "processing",
                items: [
                    { name: "Premium Organic Tomato Seeds", price: 89, quantity: 3, icon: "fa-seedling" },
                    { name: "Aroid Potting Mix (5kg)", price: 449, quantity: 1, icon: "fa-droplet" }
                ],
                listingPrice: 716,
                sellingPrice: 716,
                totalFees: 50,
                total: 766,
                paymentMethod: "Credit Card •••• 4821",
                deliveryAddress: {
                    name: "Vikram Mehta",
                    phone: "+91 98765 43210",
                    address: "A-42, Greenfield Apartments, Sector 62, Noida, Uttar Pradesh - 201301"
                },
                tracking: {
                    confirmed: { date: getDate(-2), completed: true },
                    shipped: { date: getDate(-1), completed: false },
                    outForDelivery: { date: getDate(0), completed: false },
                    delivered: { date: getDate(2), completed: false }
                }
            },
            {
                orderId: "INV00002",
                date: getDate(-15).toISOString(),
                status: "delivered",
                items: [
                    { name: "Lucky Bamboo Plant (3 Stalks)", price: 399, quantity: 2, icon: "fa-leaf" }
                ],
                listingPrice: 798,
                sellingPrice: 798,
                totalFees: 40,
                total: 838,
                paymentMethod: "Cash on Delivery",
                deliveryAddress: {
                    name: "Rahul Kapoor",
                    phone: "+91 99887 76655",
                    address: "Block C, Sunshine Heights, Andheri East, Mumbai, Maharashtra - 400069"
                },
                tracking: {
                    confirmed: { date: getDate(-15), completed: true },
                    shipped: { date: getDate(-13), completed: true },
                    outForDelivery: { date: getDate(-11), completed: true },
                    delivered: { date: getDate(-10), completed: true }
                }
            }
        ];
    }

    function initOrders() {
        // Check for incoming order from Buy Page
        checkForNewOrder();

        const saved = localStorage.getItem('green_garden_premium_orders');
        if (saved) {
            orders = JSON.parse(saved);
        } else {
            orders = generatePremiumOrders();
            localStorage.setItem('green_garden_premium_orders', JSON.stringify(orders));
        }
    }

    function formatDate(dateInput) {
        if (!dateInput) return 'N/A';
        const date = new Date(dateInput);
        return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function getStatusInfo(status) {
        const map = {
            processing: { class: 'status-processing', text: 'Processing', icon: 'fa-spinner fa-pulse' },
            shipped: { class: 'status-shipped', text: 'Shipped', icon: 'fa-truck' },
            out_for_delivery: { class: 'status-out_for_delivery', text: 'Out for Delivery', icon: 'fa-truck-fast' },
            delivered: { class: 'status-delivered', text: 'Delivered', icon: 'fa-check-circle' }
        };
        return map[status] || map.processing;
    }

    function renderOrders(tab) {
        const container = document.getElementById('ordersContainer');
        const filtered = tab === 'active' ? orders.filter(o => o.status !== 'delivered') : orders.filter(o => o.status === 'delivered');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state-premium">
                    <i class="fas fa-seedling" style="font-size: 70px; color: #cbd5e1; margin-bottom: 20px;"></i>
                    <h3 style="font-size: 24px; margin-bottom: 8px;">No orders found</h3>
                    <p style="color: #64748b;">${tab === 'active' ? 'Your active orders will appear here' : 'Your order history is empty'}</p>
                    <button class="btn-invoice-premium" style="margin-top: 24px; display: inline-flex;" id="emptyShopBtn">Start Shopping <i class="fas fa-arrow-right"></i></button>
                </div>
            `;
            const emptyBtn = document.getElementById('emptyShopBtn');
            if (emptyBtn) {
                emptyBtn.addEventListener('click', () => {
                    window.location.href = 'products.html';
                });
            }
            return;
        }

        container.innerHTML = filtered.map(order => {
            const statusInfo = getStatusInfo(order.status);
            const steps = [
                { key: 'confirmed', label: 'Confirmed', icon: 'fa-check-circle' },
                { key: 'shipped', label: 'Shipped', icon: 'fa-truck' },
                { key: 'outForDelivery', label: 'Out for Delivery', icon: 'fa-truck-fast' },
                { key: 'delivered', label: 'Delivered', icon: 'fa-check-double' }
            ];
            
            const isDelivered = order.status === 'delivered';
            
            return `
                <div class="order-card-premium">
                    <div class="order-header-premium">
                        <div class="order-id-premium">
                            <i class="fas fa-receipt"></i>
                            <span>${order.orderId}</span>
                        </div>
                        <div class="order-date-premium">
                            <i class="far fa-calendar-alt"></i>
                            ${formatDate(order.date)}
                        </div>
                        <div class="status-badge-premium ${statusInfo.class}">
                            <i class="fas ${statusInfo.icon}"></i>
                            ${statusInfo.text}
                        </div>
                    </div>
                    
                    <div class="delivery-timeline-premium">
                        <div class="timeline-premium">
                            ${steps.map((step, idx) => {
                                const stepData = order.tracking[step.key];
                                const isCompleted = stepData?.completed;
                                const isActive = !isCompleted && !isDelivered && idx === 1 && order.status === 'shipped';
                                return `
                                    <div class="timeline-step ${isCompleted ? 'completed' : (isActive ? 'active' : '')}">
                                        <div class="timeline-icon">
                                            <i class="fas ${step.icon}"></i>
                                        </div>
                                        <div class="timeline-label">${step.label}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="delivery-banner">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <i class="fas ${isDelivered ? 'fa-check-circle' : 'fa-truck'}" style="color: #10b981; font-size: 18px;"></i>
                                <span style="font-weight: 600;">${isDelivered ? 'Delivered on ' + formatDate(order.tracking.delivered.date) : 'Estimated delivery by ' + formatDate(order.tracking.delivered.date)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="order-items-premium">
                        ${order.items.map(item => `
                            <div class="order-item-premium">
                                <div class="item-img-premium">
                                    <i class="fas ${item.icon}"></i>
                                </div>
                                <div class="item-details-premium">
                                    <div class="item-name-premium">${escapeHtml(item.name)}</div>
                                    <div class="item-meta-premium">
                                        <span>Qty: ${item.quantity}</span>
                                        <span>₹${item.price.toLocaleString('en-IN')} each</span>
                                    </div>
                                </div>
                                <div class="item-price-premium">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="price-details-premium">
                        <div class="price-row-premium total-premium"><span>Total Amount</span><span>₹${order.total.toLocaleString('en-IN')}</span></div>
                        <div class="price-row-premium"><span>Payment Method</span><span>${order.paymentMethod}</span></div>
                    </div>
                    
                    <div class="order-footer-premium">
                        <button class="btn-invoice-premium" onclick='showInvoiceModal(${JSON.stringify(order).replace(/'/g, "&#39;")})'>
                            <i class="fas fa-file-pdf"></i> View Invoice
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // 2. NEW INVOICE DESIGN (Matching your uploaded template)
    function generatePremiumInvoiceHTML(order) {
        const issueDate = new Date();
        const dueDate = new Date();
        dueDate.setDate(issueDate.getDate() + 7);

        return `
            <div style="padding: 40px; font-family: 'Inter', Arial, sans-serif; color: #333;">
                <!-- Header Section -->
                <div style="text-align: center; border-bottom: 2px solid #10b981; padding-bottom: 20px; margin-bottom: 30px;">
                    <h1 style="font-size: 32px; color: #10b981; margin: 0; letter-spacing: 1px;">INVOICE</h1>
                    <h2 style="font-size: 42px; margin: 5px 0; color: #1e293b; font-weight: 800;">GREEN GARDEN</h2>
                    <p style="margin: 5px 0; font-size: 14px; color: #555;">
                        No. 12, Katpadi Road<br>
                        Gandhi Nagar, Vellore, Tamil Nadu – 632006
                    </p>
                    <p style="margin: 5px 0; font-size: 14px; color: #555;">
                        +919994247217 | greengarden2427@gmail.com<br>
                        https://greengarden24.netlify.app/
                    </p>
                    <p style="margin-top: 10px; font-weight: 600; font-size: 12px; color: #333; background: #f3f4f6; display: inline-block; padding: 4px 12px; border-radius: 4px;">
                        GSTIN: 33ABCDE1234F1Z5
                    </p>
                </div>

                <!-- Bill To & Invoice Details -->
                <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
                    <div style="width: 55%;">
                        <h3 style="margin: 0 0 10px; color: #10b981; font-size: 18px; border-bottom: 2px solid #e5e7eb; padding-bottom: 5px; display: inline-block;">BILL TO</h3>
                        <p style="margin: 0; font-size: 15px; font-weight: 700;">${escapeHtml(order.deliveryAddress.name)}</p>
                        <p style="margin: 5px 0; font-size: 13px; color: #555; line-height: 1.5;">
                            ${escapeHtml(order.deliveryAddress.address)}<br>
                            Phone: ${order.deliveryAddress.phone}
                        </p>
                    </div>
                    <div style="width: 40%; text-align: right;">
                        <table style="width: 100%; font-size: 14px; border-collapse: collapse;">
                            <tr>
                                <td style="padding: 6px 0; color: #777;">INVOICE #</td>
                                <td style="padding: 6px 0; font-weight: 700; color: #1e293b;">${order.orderId}</td>
                            </tr>
                            <tr>
                                <td style="padding: 6px 0; color: #777;">ISSUE DATE</td>
                                <td style="padding: 6px 0; font-weight: 600;">${formatDate(issueDate)}</td>
                            </tr>
                            <tr>
                                <td style="padding: 6px 0; color: #777;">DUE DATE</td>
                                <td style="padding: 6px 0; font-weight: 600;">${formatDate(dueDate)}</td>
                            </tr>
                        </table>
                    </div>
                </div>

                <!-- Items Table -->
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 14px;">
                    <thead>
                        <tr style="background: #1e293b; color: white;">
                            <th style="padding: 14px; text-align: left; font-weight: 600;">DESCRIPTION</th>
                            <th style="padding: 14px; text-align: center; font-weight: 600;">QTY</th>
                            <th style="padding: 14px; text-align: right; font-weight: 600;">PRICE</th>
                            <th style="padding: 14px; text-align: right; font-weight: 600;">AMOUNT</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${order.items.map((item, index) => `
                            <tr style="border-bottom: 1px solid #e5e7eb; background: ${index % 2 === 0 ? '#fff' : '#f9fafb'};">
                                <td style="padding: 14px;">
                                    <span style="font-weight: 600;">${escapeHtml(item.name)}</span>
                                </td>
                                <td style="padding: 14px; text-align: center;">${item.quantity}</td>
                                <td style="padding: 14px; text-align: right;">₹${item.price.toLocaleString('en-IN')}</td>
                                <td style="padding: 14px; text-align: right; font-weight: 600;">₹${(item.price * item.quantity).toLocaleString('en-IN')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <!-- Total Section -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 40px;">
                    <div style="width: 300px;">
                        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e5e7eb;">
                            <span style="color: #666;">Subtotal</span>
                            <span>₹${order.sellingPrice.toLocaleString('en-IN')}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e5e7eb;">
                            <span style="color: #666;">Taxes & Fees</span>
                            <span>₹${order.totalFees.toLocaleString('en-IN')}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 16px 0; font-size: 20px; font-weight: 800; border-top: 3px solid #10b981; margin-top: 5px;">
                            <span>TOTAL</span>
                            <span style="color: #10b981;">₹${order.total.toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div style="text-align: center; border-top: 2px solid #e5e7eb; padding-top: 20px; font-size: 12px; color: #888;">
                    <p style="margin-bottom: 5px;">Payment Method: ${order.paymentMethod}</p>
                    <p style="margin-bottom: 10px;">Thank you for shopping with Green Garden!</p>
                    <p style="font-size: 11px; color: #aaa;">This is a computer-generated invoice and does not require a signature.</p>
                </div>
            </div>
        `;
    }

    let currentOrder = null;

    function showInvoiceModal(order) {
        currentOrder = order;
        const modal = document.getElementById('invoiceModal');
        const invoiceContent = document.getElementById('invoiceContent');
        
        invoiceContent.innerHTML = generatePremiumInvoiceHTML(order);
        
        const footerDiv = document.createElement('div');
        footerDiv.style.padding = '20px 40px';
        footerDiv.style.borderTop = '1px solid #f1f5f9';
        footerDiv.style.background = 'white';
        footerDiv.style.position = 'sticky';
        footerDiv.style.bottom = '0';
        footerDiv.innerHTML = `
            <button class="btn-invoice-premium" id="downloadPdfBtn" style="width: 100%; justify-content: center;">
                <i class="fas fa-download"></i> Download PDF Invoice
            </button>
        `;
        invoiceContent.appendChild(footerDiv);
        
        const downloadBtn = document.getElementById('downloadPdfBtn');
        if (downloadBtn) {
            downloadBtn.onclick = () => {
                if (currentOrder) downloadPremiumPDF(currentOrder);
            };
        }
        
        modal.classList.add('active');
    }

    function downloadPremiumPDF(order) {
        const element = document.createElement('div');
        element.innerHTML = generatePremiumInvoiceHTML(order);
        element.style.background = 'white';
        
        const opt = {
            margin: 0,
            filename: `Invoice_${order.orderId}_GreenGarden.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save();
        showToast(`✓ Invoice downloaded: ${order.orderId}`);
    }

    function closeInvoiceModal() {
        document.getElementById('invoiceModal').classList.remove('active');
        currentOrder = null;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Navigation
    document.getElementById('backToShopBtn').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'products.html';
    });
    
    document.getElementById('viewCartBtn').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'cart.html';
    });

    document.querySelectorAll('.tab-premium').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-premium').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders(btn.dataset.tab);
        });
    });

    window.onclick = function(e) {
        const modal = document.getElementById('invoiceModal');
        if (e.target === modal) closeInvoiceModal();
    };

    // Initialize
    initOrders();
    renderOrders('active');
</script>
</body>
</html>
