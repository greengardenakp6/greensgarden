<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Create Account | Green Garden</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        .shape-1 { width: 300px; height: 300px; top: -100px; right: -100px; animation-delay: 0s; }
        .shape-2 { width: 200px; height: 200px; bottom: 50px; left: -80px; animation-delay: 2s; }
        .shape-3 { width: 150px; height: 150px; top: 40%; left: 20%; animation-delay: 4s; }
        .shape-4 { width: 100px; height: 100px; bottom: 20%; right: 10%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* Main Container */
        .register-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: slideUpFade 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: center;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header Section */
        .card-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 32px 32px 28px;
            text-align: center;
            position: relative;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 25px -5px rgba(16,185,129,0.4);
            animation: bounceIn 0.5s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .brand-icon i {
            font-size: 36px;
            color: white;
        }

        .card-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .card-header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* Form Section */
        .card-body {
            padding: 32px;
            background: white;
        }

        /* Input Groups - Flipkart Style */
        .input-field {
            margin-bottom: 20px;
            position: relative;
        }

        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .input-wrapper:hover {
            border-color: #cbd5e1;
            background: white;
        }

        .input-wrapper:focus-within {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16,185,129,0.1);
            background: white;
        }

        .input-icon {
            padding: 0 16px;
            color: #94a3b8;
            font-size: 18px;
            transition: color 0.3s;
        }

        .input-wrapper:focus-within .input-icon {
            color: #10b981;
        }

        .input-wrapper input {
            flex: 1;
            padding: 16px 16px 16px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 500;
            color: #0f172a;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .toggle-pwd {
            padding: 0 16px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .toggle-pwd:hover {
            color: #10b981;
            transform: scale(1.1);
        }

        /* Strength Meter */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 6px;
            color: #64748b;
            font-weight: 500;
        }

        /* Submit Button - Flipkart Style */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #fb641b, #ff7e2e);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-top: 24px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-submit:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(251,100,27,0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Message Alert */
        .alert-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-message.error {
            background: #fef2f2;
            color: #dc2626;
            border-left: 4px solid #dc2626;
        }

        .alert-message.success {
            background: #f0fdf4;
            color: #16a34a;
            border-left: 4px solid #16a34a;
        }

        .alert-message i {
            font-size: 18px;
        }

        /* Footer Link */
        .footer-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .footer-link p {
            color: #64748b;
            font-size: 14px;
        }

        .footer-link a {
            color: #fb641b;
            text-decoration: none;
            font-weight: 700;
            margin-left: 6px;
            transition: all 0.2s;
        }

        .footer-link a:hover {
            color: #10b981;
            text-decoration: underline;
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .register-card {
                border-radius: 24px;
            }
            .card-header {
                padding: 24px 20px;
            }
            .card-body {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
</div>

<div class="register-wrapper">
    <div class="register-card">
        <div class="card-header">
            <div class="brand-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join Green Garden and start your green journey</p>
        </div>

        <div class="card-body">
            <div id="alertMessage" class="alert-message" style="display: none;"></div>

            <form id="registerForm">
                <!-- Full Name -->
                <div class="input-field">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name">
                    </div>
                </div>

                <!-- Email -->
                <div class="input-field">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
                    </div>
                </div>

                <!-- Password -->
                <div class="input-field">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="password" placeholder="Create a password">
                        <div class="toggle-pwd" onclick="togglePasswordVisibility('password', this)">
                            <i class="fas fa-eye-slash"></i>
                        </div>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Password strength: Weak</div>
                </div>

                <!-- Confirm Password -->
                <div class="input-field">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                        <div class="toggle-pwd" onclick="togglePasswordVisibility('confirmPassword', this)">
                            <i class="fas fa-eye-slash"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>Sign Up</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="footer-link">
                <p>Already have an account?<a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-notification"></div>

<script>
    // Password Strength Checker
    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;
        
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');
        
        if (password.length === 0) {
            bar.style.width = '0%';
            bar.style.background = '#e2e8f0';
            text.textContent = 'Password strength: Not set';
            text.style.color = '#64748b';
            return 0;
        }
        
        if (strength <= 2) {
            bar.style.width = '33%';
            bar.style.background = '#ef4444';
            text.textContent = 'Password strength: Weak';
            text.style.color = '#ef4444';
            return 1;
        } else if (strength <= 4) {
            bar.style.width = '66%';
            bar.style.background = '#f59e0b';
            text.textContent = 'Password strength: Medium';
            text.style.color = '#f59e0b';
            return 2;
        } else {
            bar.style.width = '100%';
            bar.style.background = '#10b981';
            text.textContent = 'Password strength: Strong';
            text.style.color = '#10b981';
            return 3;
        }
    }

    // Toggle Password Visibility
    function togglePasswordVisibility(inputId, element) {
        const input = document.getElementById(inputId);
        const icon = element.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    }

    // Show Toast Message
    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // Show Alert Message
    function showAlert(message, type) {
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.innerHTML = `
            <i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i>
            <span>${message}</span>
        `;
        alertDiv.className = `alert-message ${type}`;
        alertDiv.style.display = 'flex';
        
        // Auto hide after 5 seconds for success
        if (type === 'success') {
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
    }

    // Hide Alert
    function hideAlert() {
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.style.display = 'none';
    }

    // Email Validation
    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return emailRegex.test(email);
    }

    // Check if user exists
    function isUserExists(email) {
        return localStorage.getItem(`user_${email}`) !== null;
    }

    // Save User
    function saveUser(email, userData) {
        localStorage.setItem(`user_${email}`, JSON.stringify(userData));
        
        // Also maintain a list of registered emails
        let usersList = localStorage.getItem('registered_users');
        if (usersList) {
            usersList = JSON.parse(usersList);
            if (!usersList.includes(email)) {
                usersList.push(email);
                localStorage.setItem('registered_users', JSON.stringify(usersList));
            }
        } else {
            localStorage.setItem('registered_users', JSON.stringify([email]));
        }
    }

    // Form Submit Handler
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const emailInput = document.getElementById('email');
    const nameInput = document.getElementById('fullName');

    // Real-time password strength check
    passwordInput.addEventListener('input', function() {
        checkPasswordStrength(this.value);
        
        // Also check confirm password match in real-time
        if (confirmInput.value && this.value !== confirmInput.value) {
            confirmInput.style.borderColor = '#ef4444';
        } else if (confirmInput.value) {
            confirmInput.style.borderColor = '#10b981';
        }
    });

    // Real-time confirm password check
    confirmInput.addEventListener('input', function() {
        if (this.value && this.value !== passwordInput.value) {
            this.style.borderColor = '#ef4444';
        } else if (this.value) {
            this.style.borderColor = '#10b981';
        } else {
            this.style.borderColor = '#e2e8f0';
        }
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Get values
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPass = confirmInput.value;
        
        // Hide previous alert
        hideAlert();
        
        // Validations with Flipkart-style feedback
        if (!name) {
            showAlert('Please enter your full name', 'error');
            showToast('Full name is required', true);
            nameInput.parentElement.classList.add('shake');
            setTimeout(() => nameInput.parentElement.classList.remove('shake'), 500);
            return;
        }
        
        if (!email) {
            showAlert('Please enter your email address', 'error');
            showToast('Email address is required', true);
            emailInput.parentElement.classList.add('shake');
            setTimeout(() => emailInput.parentElement.classList.remove('shake'), 500);
            return;
        }
        
        if (!isValidEmail(email)) {
            showAlert('Please enter a valid email address', 'error');
            showToast('Invalid email format', true);
            emailInput.parentElement.classList.add('shake');
            setTimeout(() => emailInput.parentElement.classList.remove('shake'), 500);
            return;
        }
        
        if (!password) {
            showAlert('Please create a password', 'error');
            showToast('Password is required', true);
            passwordInput.parentElement.classList.add('shake');
            setTimeout(() => passwordInput.parentElement.classList.remove('shake'), 500);
            return;
        }
        
        if (password.length < 6) {
            showAlert('Password must be at least 6 characters long', 'error');
            showToast('Password too short (min 6 characters)', true);
            passwordInput.parentElement.classList.add('shake');
            setTimeout(() => passwordInput.parentElement.classList.remove('shake'), 500);
            return;
        }
        
        if (password !== confirmPass) {
            showAlert('Passwords do not match', 'error');
            showToast('Please make sure passwords match', true);
            confirmInput.parentElement.classList.add('shake');
            setTimeout(() => confirmInput.parentElement.classList.remove('shake'), 500);
            return;
        }
        
        // Check if user already exists
        if (isUserExists(email)) {
            showAlert('Email already registered! Please login instead.', 'error');
            showToast('Account already exists', true);
            return;
        }
        
        // Show loading state
        submitBtn.disabled = true;
        const originalBtnHTML = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span>Creating Account</span><div class="spinner"></div>';
        
        // Simulate API call with animation
        setTimeout(() => {
            // Save user data
            const userData = {
                name: name,
                email: email,
                password: password,
                createdAt: new Date().toISOString(),
                avatar: null
            };
            saveUser(email, userData);
            
            // Also store current session
            sessionStorage.setItem('currentUser', JSON.stringify({
                name: name,
                email: email,
                isLoggedIn: true
            }));
            
            // Show success
            showAlert('Account created successfully! Redirecting to shop...', 'success');
            showToast('Welcome to Green Garden! 🎉');
            
            // Add success animation to button
            submitBtn.style.background = '#10b981';
            submitBtn.innerHTML = '<span>Success!</span><i class="fas fa-check-circle"></i>';
            
            // Redirect after delay
            setTimeout(() => {
                window.location.href = 'products.html';
            }, 1500);
        }, 1000);
    });
    
    // Add shake animation CSS
    const style = document.createElement('style');
    style.textContent = `
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .input-wrapper {
            transition: all 0.3s;
        }
    `;
    document.head.appendChild(style);
    
    // Service Worker Registration (PWA)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(err => {
            console.log('Service Worker registration failed:', err);
        });
    }
    
    // Add floating label effect (optional enhancement)
    const inputs = document.querySelectorAll('.input-wrapper input');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.01)';
        });
        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    });
</script>
</body>
</html>
